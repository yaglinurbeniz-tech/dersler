<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kodlama Görev Merkezi</title>
<style>
  :root{
    --bg:#0b1026; --panel:#151d40; --ink:#eef2ff; --dim:#8b96c9;
    --amber:#ffb545; --cyan:#39d3e6; --line:#2a356e;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, #1a2560 0%, transparent 55%),
      radial-gradient(ellipse at 90% 110%, #241a4d 0%, transparent 50%),
      var(--bg);
    color:var(--ink);
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    min-height:100vh; line-height:1.5;
  }
  .star{position:fixed; background:#fff; border-radius:50%; opacity:.7; pointer-events:none;
        animation:tw 3s ease-in-out infinite;}
  @keyframes tw{50%{opacity:.15}}
  @media (prefers-reduced-motion: reduce){ .star{animation:none} }

  .wrap{max-width:560px; margin:0 auto; padding:70px 18px;}
  .eyebrow{font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--cyan); text-align:center; margin-bottom:12px;}
  h1{font-size:32px; text-align:center;}
  h1 span{color:var(--amber);}
  .sub{color:var(--dim); text-align:center; margin-top:8px; margin-bottom:44px;}

  .student{
    display:flex; align-items:center; gap:18px;
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:20px 22px; margin-bottom:16px;
    text-decoration:none; color:var(--ink);
    transition:border-color .15s, transform .15s;
  }
  .student:hover{border-color:var(--amber); transform:translateX(4px);}
  .avatar{
    font-size:28px; width:54px; height:54px; flex:0 0 54px;
    display:flex; align-items:center; justify-content:center;
    background:#0d1330; border:1.5px solid var(--cyan); border-radius:50%;
  }
  .sname{font-weight:bold; font-size:20px;}
  .sdesc{font-size:13px; color:var(--dim);}
  .go{margin-left:auto; color:var(--amber); font-size:22px;}

  .foot{text-align:center; color:var(--dim); font-size:12px; margin-top:44px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Kodlama Görev Merkezi</div>
  <h1>Pilot <span>Girişi</span></h1>
  <p class="sub">Adına dokun, görev üssüne ışınlan.</p>

  <a class="student" href="ogrenciler/Poyraz/">
    <div class="avatar">🚀</div>
    <div>
      <div class="sname">Poyraz</div>
      <div class="sdesc">Python · Pygame Zero · Uzay Görevleri</div>
    </div>
    <div class="go">→</div>
  </a>

  <a class="student" href="ogrenciler/Eren/">
    <div class="avatar">🛡️</div>
    <div>
      <div class="sname">Eren</div>
      <div class="sdesc">Python · SpeakGuard · Çeviri Kontrolü</div>
    </div>
    <div class="go">→</div>
  </a>

  <a class="student" href="ogrenciler/İlhan/">
    <div class="avatar">🎮</div>
    <div>
      <div class="sname">İlhan</div>
      <div class="sdesc">Oyun Tasarımı · Menü Sistemi</div>
    </div>
    <div class="go">→</div>
  </a>

  <a class="student" href="ogrenciler/Güneş/">
    <div class="avatar">🐱</div>
    <div>
      <div class="sname">Güneş</div>
      <div class="sdesc">Scratch · Ustalık Günü</div>
    </div>
    <div class="go">→</div>
  </a>

  <!-- YENİ ÖĞRENCİ EKLEMEK İÇİN: yukarıdaki <a> bloğunu kopyala,
       href="ogrenciler/KLASORADI/" yap, emojiyi ve ismi değiştir. Örnek:

  <a class="student" href="ogrenciler/ayse/">
    <div class="avatar">🛰️</div>
    <div>
      <div class="sname">Ayşe</div>
      <div class="sdesc">Scratch · Oyun Tasarımı</div>
    </div>
    <div class="go">→</div>
  </a>
  -->

  <div class="foot">Her pilotun kendi görev üssü · XP topla, rütbe atla</div>
</div>

<script>
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'vw;top:'+(Math.random()*100)+'vh;animation-delay:'+(Math.random()*3)+'s';
    document.body.appendChild(s);
  }
</script>
</body>
</html>
